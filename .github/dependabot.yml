version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm" # covers the pnpm workspace — pnpm-lock.yaml is auto-detected
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Pinned to 6.x deliberately, not a default — vue-tsc and Angular's language-service
      # tooling don't support TS 7's compiler yet. See docs/setup-guide.md. Revisit at TS 7.1
      # (~Oct 2026) by removing this rule, not by letting Dependabot bump it unnoticed.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
