name: Bug report
description: Something in Imora doesn't work as documented or expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you expected instead, too, if it's not obvious
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - gateway
        - ingestion
        - query-api
        - alert-engine
        - workers
        - notification-service
        - dashboard
        - browser-sdk (core/react/vue/angular)
        - packages/domain-types or event-schemas
        - build/tooling (Taskfile, CI, dev-reload)
        - docs
        - other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD`, or a release tag
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false
